services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://reasportal:${DB_PASSWORD:-secret}@db:5432/reasportal
      PORTAL_API_KEY: ${PORTAL_API_KEY}
      ACTIVATION_SECRET: ${ACTIVATION_SECRET}
      CORS_ORIGINS: '["https://${DOMAIN:-localhost}"]'
      RELEASE_DIR: /release
    volumes:
      - /home/frank_weng/release:/release:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_PORTAL_API_KEY: ${PORTAL_API_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    external: true
    name: reas-portal_default
